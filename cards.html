<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéMarket | Cards</title>
  <meta name="description" content="Browse Pokémon cards and market prices on PokéMarket.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;0,300;0,400;0,700;0,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="border-bottom bg-white">
    <div class="container">
      <nav class="navbar navbar-expand-lg py-3" aria-label="Main navigation">
        <a class="navbar-brand fw-bold fs-3" href="index.html">PokéMarket</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sets.html">Sets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="cards.html" aria-current="page">Cards</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Watchlist</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-dark ms-lg-2" href="#">Sign In</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main id="main-content">
    <!-- Intro -->
    <section class="hero-section py-5 text-center">
      <div class="container">
        <h1 class="display-6 fw-bold mb-3">Browse Pokémon Cards</h1>
        <p class="lead text-secondary mb-4 mx-auto hero-text">
          Search cards, filter by set, and view market price data.
        </p>

        <!-- Filters -->
        <div class="row justify-content-center g-3">
          <div class="col-12 col-lg-4">
            <label for="card-search-page" class="visually-hidden">Search cards</label>
            <input
              type="search"
              id="card-search-page"
              class="form-control form-control-lg"
              placeholder="Search cards by name"
            >
          </div>

          <div class="col-12 col-lg-3">
            <label for="card-set-filter" class="visually-hidden">Filter by set</label>
            <input
              type="search"
              id="card-set-filter"
              class="form-control form-control-lg"
              placeholder="Filter by set name"
            >
          </div>

          <div class="col-12 col-lg-3">
            <label for="card-sort" class="visually-hidden">Sort cards</label>
            <select id="card-sort" class="form-select form-select-lg">
              <option value="name">Name A-Z</option>
              <option value="-name">Name Z-A</option>
              <option value="-set.releaseDate">Newest set first</option>
              <option value="set.releaseDate">Oldest set first</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Cards grid -->
    <section class="py-5" aria-labelledby="cards-heading">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <div>
            <h2 id="cards-heading" class="h2 mb-1">All Cards</h2>
            <p class="text-secondary mb-0" id="cards-count">Loading cards...</p>
          </div>
        </div>

        <!-- Loading -->
        <div id="cards-loading" class="text-center py-5">
          <div class="spinner-border" role="status" aria-hidden="true"></div>
          <p class="mt-3 text-secondary mb-0">Loading cards...</p>
        </div>

        <!-- Error -->
        <div id="cards-error" class="alert alert-danger d-none" role="alert">
          Unable to load cards right now.
        </div>

        <!-- Results -->
        <div id="cards-grid" class="row g-4"></div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center gap-2 mt-5">
          <button id="prev-cards" class="btn btn-outline-dark" type="button">Previous</button>
          <span id="cards-page-info" class="align-self-center text-secondary">Page 1</span>
          <button id="next-cards" class="btn btn-dark" type="button">Next</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="py-4 bg-white border-top">
    <div class="container">
      <p class="mb-0 text-secondary">&copy; 2026 PokeMarket</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Page JS -->
  <script src="cards.js"></script>
</body>
</html>
