<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéMarket | Card Details</title>
  <meta name="description" content="View Pokémon card details and prices on PokéMarket.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;0,300;0,400;0,700;0,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Site Header -->
  <header class="border-bottom bg-white">
    <div class="container">
      <nav class="navbar navbar-expand-lg py-3" aria-label="Main navigation">
        <a class="navbar-brand fw-bold fs-3" href="index.html">PokéMarket</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="sets.html">Sets</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="cards.html" aria-current="page">Cards</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">Watchlist</a>
            </li>

            <li class="nav-item">
              <a class="btn btn-dark ms-lg-2" href="#">Sign In</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main page content -->
  <main id="main-content">
    <section class="py-5">
      <div class="container">

        <a href="cards.html" class="btn btn-outline-dark mb-4">
          &larr; Back to Cards
        </a>

        <!-- Loading message -->
        <div id="card-loading" class="text-center py-5">
          <div class="spinner-border" role="status" aria-hidden="true"></div>
          <p class="mt-3 text-secondary mb-0">Loading card...</p>
        </div>

        <!-- Error message -->
        <div id="card-error" class="alert alert-danger d-none" role="alert">
          Could not load this card.
        </div>

        <!-- Card details will be inserted here -->
        <div id="card-detail" class="d-none"></div>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="py-4 bg-white border-top">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
      <p class="mb-0 text-secondary">
        &copy; 2026 PokeMarket
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="card.js"></script>
</body>
</html>
